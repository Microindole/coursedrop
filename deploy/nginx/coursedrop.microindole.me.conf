server {
    server_name coursedrop.microindole.me;

    client_max_body_size 256m;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/coursedrop.microindole.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coursedrop.microindole.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = coursedrop.microindole.me) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name coursedrop.microindole.me;
    return 404;
}
