name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  format:
    name: Format guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check text formatting
        uses: ./.github/actions/check-format

  docs:
    name: Docs and links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository docs
        uses: ./.github/actions/check-docs

      - name: Check external Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude '^https?://\{server\}'
            --exclude '^https?://server/'
            --accept 200,204,206,301,302,429
            './**/*.md'

  server:
    name: Java server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test server
        uses: ./.github/actions/build-server
        with:
          working-directory: apps/server

  harmony:
    name: Harmony client structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check HarmonyOS client structure
        uses: ./.github/actions/check-harmony
        with:
          working-directory: apps/harmony
