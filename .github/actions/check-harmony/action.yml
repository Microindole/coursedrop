name: Check Harmony Client
description: Verify the HarmonyOS client keeps the expected native project layout.

inputs:
  working-directory:
    description: Directory containing the HarmonyOS project.
    required: false
    default: apps/harmony

runs:
  using: composite
  steps:
    - name: Check project files
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        required_files=(
          "oh-package.json5"
          "build-profile.json5"
          "hvigorfile.ts"
          "hvigor/hvigor-config.json5"
          "AppScope/app.json5"
          "entry/oh-package.json5"
          "entry/build-profile.json5"
          "entry/hvigorfile.ts"
          "entry/src/main/module.json5"
          "entry/src/main/ets/entryability/EntryAbility.ets"
          "entry/src/main/ets/components/README.md"
          "entry/src/main/ets/components/index.ets"
          "entry/src/main/ets/components/actions/CdButton.ets"
          "entry/src/main/ets/components/inputs/CdTextField.ets"
          "entry/src/main/ets/components/feedback/CdStatusPill.ets"
          "entry/src/main/ets/models/CommonTypes.ets"
          "entry/src/main/ets/models/ShareSession.ets"
          "entry/src/main/ets/models/Device.ets"
          "entry/src/main/ets/models/TransferTask.ets"
          "entry/src/main/ets/models/LocalFileEntry.ets"
          "entry/src/main/ets/models/RelayServerConfig.ets"
          "entry/src/main/ets/models/index.ets"
          "entry/src/main/ets/viewmodels/ShareViewModel.ets"
          "entry/src/main/ets/viewmodels/LocalLibraryViewModel.ets"
          "entry/src/main/ets/viewmodels/DeviceViewModel.ets"
          "entry/src/main/ets/viewmodels/SettingsViewModel.ets"
          "entry/src/main/ets/viewmodels/index.ets"
          "entry/src/main/ets/pages/HomePage.ets"
          "entry/src/main/ets/pages/SharePage.ets"
          "entry/src/main/ets/pages/LocalLibraryPage.ets"
          "entry/src/main/ets/pages/DevicePage.ets"
          "entry/src/main/ets/pages/SettingsPage.ets"
          "entry/src/main/resources/base/profile/main_pages.json"
          "entry/src/main/ets/components/business/CdFileList.ets"
          "entry/src/main/ets/components/business/CdDeviceList.ets"
          "entry/src/main/ets/components/business/CdRelaySourceList.ets"
          "entry/src/main/ets/components/navigation/CdBottomTabs.ets"
        )

        for file in "${required_files[@]}"; do
          if [[ ! -s "$file" ]]; then
            echo "Missing or empty HarmonyOS project file: $file"
            exit 1
          fi
        done

    - name: Check expected source layers
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        required_dirs=(
          "entry/src/main/ets/common"
          "entry/src/main/ets/components"
          "entry/src/main/ets/components/actions"
          "entry/src/main/ets/components/business"
          "entry/src/main/ets/components/display"
          "entry/src/main/ets/components/feedback"
          "entry/src/main/ets/components/inputs"
          "entry/src/main/ets/components/layout"
          "entry/src/main/ets/components/navigation"
          "entry/src/main/ets/entryability"
          "entry/src/main/ets/models"
          "entry/src/main/ets/pages"
          "entry/src/main/ets/services"
          "entry/src/main/ets/viewmodels"
        )

        for dir in "${required_dirs[@]}"; do
          if [[ ! -d "$dir" ]]; then
            echo "Missing HarmonyOS source layer: $dir"
            exit 1
          fi
        done
