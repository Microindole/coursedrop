name: Build Harmony Client
description: Build the HarmonyOS ArkTS client with a downloaded DevEco/Harmony command-line toolchain.

inputs:
  working-directory:
    description: Directory containing the HarmonyOS project.
    required: false
    default: apps/harmony
  command-line-tools-url:
    description: Optional direct URL of a HarmonyOS command-line tools zip.
    required: false
    default: ''
  toolchain-release-tag:
    description: Release tag containing the HarmonyOS command-line tools zip.
    required: false
    default: harmony-toolchain
  toolchain-asset-name:
    description: Release asset name for the HarmonyOS command-line tools zip.
    required: false
    default: harmony-command-line-tools-linux.zip
  build-command:
    description: Command used to build the HAP.
    required: false
    default: if command -v hvigorw >/dev/null 2>&1; then hvigorw --mode module -p module=entry@default -p product=default -p requiredDeviceType=phone assembleHap --parallel --incremental --daemon; else hvigor --mode module -p module=entry@default -p product=default -p requiredDeviceType=phone assembleHap --parallel --incremental --daemon; fi

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Download Harmony command-line tools
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/harmony-tools" "$RUNNER_TEMP/harmony-tools-download"
        archive="$RUNNER_TEMP/harmony-tools-download/${{ inputs.toolchain-asset-name }}"
        if [[ -n "${{ inputs.command-line-tools-url }}" ]]; then
          curl -fL "${{ inputs.command-line-tools-url }}" -o "$archive"
        else
          gh release download "${{ inputs.toolchain-release-tag }}" \
            --pattern "${{ inputs.toolchain-asset-name }}" \
            --dir "$RUNNER_TEMP/harmony-tools-download" \
            --clobber
        fi
        unzip -q "$archive" -d "$RUNNER_TEMP/harmony-tools"

    - name: Add Harmony command-line tools to PATH
      shell: bash
      run: |
        set -euo pipefail
        tools_root="$RUNNER_TEMP/harmony-tools"
        echo "Extracted toolchain layout:"
        find "$tools_root" -maxdepth 4 -type f \( -name ohpm -o -name hvigor -o -name hvigorw \) -print | sort

        mapfile -t tool_dirs < <(
          find "$tools_root" -type f \( -name ohpm -o -name hvigor -o -name hvigorw -o -name sdkmgr \) -print \
            | xargs -r -n 1 dirname \
            | sort -u
        )
        if [[ "${#tool_dirs[@]}" -eq 0 ]]; then
          echo "No ohpm/hvigor/hvigorw/sdkmgr executable found in the command-line tools zip."
          exit 1
        fi

        find "$tools_root" -type f \( -name ohpm -o -name hvigor -o -name hvigorw -o -name sdkmgr \) -exec chmod +x {} +
        for dir in "${tool_dirs[@]}"; do
          echo "$dir" >> "$GITHUB_PATH"
        done

        sdk_dir="$(find "$tools_root" -type d -path '*/sdk' -print -quit)"
        if [[ -n "$sdk_dir" ]]; then
          echo "HOS_SDK_HOME=$sdk_dir" >> "$GITHUB_ENV"
          echo "DEVECO_SDK_HOME=$sdk_dir" >> "$GITHUB_ENV"
        fi

    - name: Require Harmony command-line tools
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v ohpm >/dev/null 2>&1; then
          echo "Missing ohpm after extracting the Harmony command-line tools zip."
          exit 1
        fi
        if ! command -v hvigorw >/dev/null 2>&1 && ! command -v hvigor >/dev/null 2>&1; then
          echo "Missing hvigorw/hvigor after extracting the Harmony command-line tools zip."
          exit 1
        fi

    - name: Check Harmony SDK components
      shell: bash
      run: |
        set -euo pipefail
        sdk_root="${HOS_SDK_HOME:-${DEVECO_SDK_HOME:-}}"
        if [[ -z "$sdk_root" || ! -d "$sdk_root" ]]; then
          echo "Missing Harmony SDK directory in the toolchain archive."
          echo "The archive must include SDK components, not only command-line-tools/bin, hvigor, and ohpm."
          echo "Expected either command-line-tools/sdk/default or command-line-tools/sdk with OpenHarmony/HarmonyOS SDK content."
          exit 1
        fi

        echo "Using Harmony SDK root: $sdk_root"
        echo "SDK layout:"
        find "$sdk_root" -maxdepth 3 -type d | sort | head -n 80
        echo "SDK tool files:"
        find "$sdk_root" -maxdepth 5 -type f \( -name ark_disasm -o -name ark_disasm.exe -o -name es2abc -o -name es2abc.exe -o -name syscap_tool -o -name syscap_tool.exe \) -print | sort

        if ! find "$sdk_root" -type d -path '*/openharmony/toolchains' -print -quit | grep -q .; then
          echo "Missing OpenHarmony toolchains SDK component."
          exit 1
        fi
        if ! find "$sdk_root" -type d -path '*/openharmony/ets' -print -quit | grep -q .; then
          echo "Missing OpenHarmony ets SDK component."
          exit 1
        fi

        if find "$sdk_root" -type f -path '*/openharmony/toolchains/*.exe' -print -quit | grep -q . &&
          ! find "$sdk_root" -type f -path '*/openharmony/toolchains/*' ! -name '*.exe' -print -quit | grep -q .; then
          echo "The SDK appears to contain Windows toolchain binaries only. ubuntu-latest requires Linux SDK components."
          exit 1
        fi

        find "$sdk_root" -type f -path '*/openharmony/toolchains/*' -exec chmod +x {} + || true

    - name: Write Harmony SDK local properties
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        sdk_root="${HOS_SDK_HOME:-${DEVECO_SDK_HOME:-}}"
        if [[ -z "$sdk_root" ]]; then
          echo "HOS_SDK_HOME/DEVECO_SDK_HOME is not set."
          exit 1
        fi
        {
          echo "sdk.dir=$sdk_root"
          echo "nodejs.dir=$(dirname "$(dirname "$(command -v node)")")"
        } > local.properties
        echo "Wrote local.properties:"
        sed 's#=.*#=<set>#' local.properties

    - name: Show tool versions
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        node --version
        ohpm --version
        if command -v hvigorw >/dev/null 2>&1; then
          hvigorw --version
        else
          hvigor --version
        fi

    - name: Install Harmony dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        ohpm install

    - name: Build HAP
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        ${{ inputs.build-command }}
