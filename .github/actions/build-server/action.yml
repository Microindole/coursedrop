name: Build Java Server
description: Build and test the CourseDrop Spring Boot server.

inputs:
  working-directory:
    description: Directory containing the server Maven project.
    required: false
    default: apps/server

runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
        cache-dependency-path: ${{ inputs.working-directory }}/pom.xml

    - name: Run Maven verification
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: mvn --batch-mode verify
