name: Check Harmony Mock Data
description: Verify HarmonyOS mock data stays isolated from pages and services.

inputs:
  working-directory:
    description: Directory containing the HarmonyOS project.
    required: false
    default: apps/harmony

runs:
  using: composite
  steps:
    - name: Check mock files
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        required_files=(
          "entry/src/main/ets/mocks/MockShareSessions.ets"
          "entry/src/main/ets/mocks/MockTransferItems.ets"
          "entry/src/main/ets/mocks/MockDevices.ets"
          "entry/src/main/ets/mocks/MockTransferTasks.ets"
          "entry/src/main/ets/mocks/MockLocalFiles.ets"
          "entry/src/main/ets/mocks/index.ets"
        )

        if [[ ! -d "entry/src/main/ets/mocks" ]]; then
          echo "Missing Harmony mock data layer: entry/src/main/ets/mocks"
          exit 1
        fi

        for file in "${required_files[@]}"; do
          if [[ ! -s "$file" ]]; then
            echo "Missing or empty Harmony mock data file: $file"
            exit 1
          fi
        done

    - name: Check mock dependency boundaries
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        if grep -R "from '../mocks\\|from './mocks\\|from .*mocks" entry/src/main/ets/pages entry/src/main/ets/services 2>/dev/null; then
          echo "Pages and services must not import mock data directly. Route mock data through viewmodels while scaffolding UI."
          exit 1
        fi

        if grep -R "from '../pages\\|from '../viewmodels\\|from '../services\\|from '../components" entry/src/main/ets/mocks 2>/dev/null; then
          echo "Mock data must depend only on models or other mock files."
          exit 1
        fi
