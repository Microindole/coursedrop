<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景蓝绿渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#73e3e4" />
      <stop offset="50%" stop-color="#49a3dd" />
      <stop offset="100%" stop-color="#2c67b2" />
    </linearGradient>

    <!-- 文件夹后盖 -->
    <linearGradient id="foldBack" x1="100" y1="180" x2="412" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6baae8" />
      <stop offset="100%" stop-color="#2a5fa4" />
    </linearGradient>

    <!-- 文件卡片 -->
    <linearGradient id="card" x1="0" y1="0" x2="120" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e8f5" />
    </linearGradient>

    <!-- 文件夹前盖 -->
    <linearGradient id="foldFront" x1="92" y1="240" x2="412" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#99cfff" />
      <stop offset="100%" stop-color="#3472be" />
    </linearGradient>

    <!-- 绿色立体箭头 -->
    <linearGradient id="arrow" x1="190" y1="140" x2="375" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ee083" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>
  </defs>

  <!-- 1. 背景底座 -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="url(#bg)" />

  <!-- 2. 背景微弱科技线条（去除小圆圈，降低鸿蒙解析负担） -->
  <path d="M 256 120 L 120 256 L 256 392 L 392 256 Z M 256 120 L 256 392" stroke="#ffffff" stroke-width="2" opacity="0.15" fill="none" />

  <!-- 整体内容平移 -->
  <g transform="translate(0, -10)">

    <!-- 3. 文件夹后盖 -->
    <path d="M 120 180 L 220 180 L 250 210 L 392 210 C 405 210 412 218 412 230 L 412 380 C 412 392 405 400 392 400 L 120 400 C 107 400 100 392 100 380 L 100 200 C 100 188 107 180 120 180 Z" fill="url(#foldBack)" />

    <!-- 4. 文件卡片 -->
    <g transform="translate(240, 140) rotate(12)">
      <path d="M 0 0 L 90 0 L 120 30 L 120 180 C 120 186 115 190 110 190 L 10 190 C 4 190 0 186 0 180 Z" fill="url(#card)" />
      <path d="M 90 0 L 90 22 C 90 26 94 30 98 30 L 120 30 Z" fill="#b0cde6" />
      <path d="M 60 70 L 60 120 M 45 105 L 60 120 L 75 105" stroke="#49a3dd" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- 5. 文件夹前盖 -->
    <path d="M 100 240 L 160 240 C 175 240 185 245 190 255 L 210 295 C 215 305 225 310 240 310 L 392 310 C 408 310 416 320 412 335 L 392 415 C 388 428 375 436 360 436 L 120 436 C 102 436 92 424 92 408 L 92 256 C 92 245 96 240 100 240 Z" fill="url(#foldFront)" />
    <!-- 用深色半透明线条代替复杂的阴影，勾勒前盖边缘 -->
    <path d="M 100 240 L 160 240 C 175 240 185 245 190 255 L 210 295 C 215 305 225 310 240 310 L 392 310" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />

    <!-- 6. 传输箭头（去掉复杂的立体暗边，改用纯色块#1b5e20做投影衬底） -->
    <path d="M 220 244 C 220 164 310 164 310 244 L 275 244 L 325 309 L 375 244 L 340 244 C 340 144 190 144 190 244 Z" fill="#1b5e20" opacity="0.5" transform="translate(0, 5)" />
    <!-- 箭头主体 -->
    <path d="M 220 240 C 220 160 310 160 310 240 L 275 240 L 325 305 L 375 240 L 340 240 C 340 140 190 140 190 240 Z" fill="url(#arrow)" />
  </g>
</svg>
