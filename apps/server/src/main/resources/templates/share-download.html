<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CourseDrop - 共享文件提取</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/images/logo.svg}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'selector',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857'
            }
          }
        }
      }
    }
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .font-heading {
      font-family: 'Outfit', sans-serif;
    }

    .font-mono-custom {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body
  class="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased bg-grid-pattern relative overflow-x-hidden pb-12 transition-all-300">

  <!-- 极光背景 -->
  <div
    class="absolute top-0 left-1/4 -z-10 h-[500px] w-[500px] rounded-full bg-emerald-500/10 dark:bg-emerald-500/5 blur-[120px] mix-blend-screen animate-glow pointer-events-none">
  </div>

  <!-- 导航栏 -->
  <nav class="mx-auto max-w-6xl px-6 pt-6 flex justify-between items-center">
    <a href="/" class="flex items-center gap-3 hover:opacity-85 transition-opacity">
      <span
        class="font-heading text-lg font-bold tracking-tight bg-gradient-to-r from-zinc-900 to-zinc-600 dark:from-white dark:to-zinc-300 bg-clip-text text-transparent">CourseDrop</span>
    </a>

    <!-- 主题切换 -->
    <button id="theme-toggle" onclick="toggleTheme(event)"
      class="inline-flex items-center gap-2 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 p-2 text-zinc-500 dark:text-zinc-400 backdrop-blur-md shadow-sm hover:text-zinc-900 dark:hover:text-white transition duration-200">
      <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
      <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
  </nav>

  <main
    class="mx-auto grid min-h-screen w-full max-w-6xl gap-8 px-6 py-8 md:py-16 md:grid-cols-[1fr_360px] md:items-start lg:px-8 opacity-0">

    <!-- 左栏：文件提取面板 -->
    <section class="glass-card rounded-2xl p-6 sm:p-8 shadow-sm border border-zinc-100 dark:border-zinc-900">
      <div
        class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-zinc-100 dark:border-zinc-800/80 pb-6">
        <div class="flex items-center gap-3">
          <div>
            <h1 class="text-xl font-bold tracking-tight text-zinc-900 dark:text-white">文件提取通道</h1>
            <p class="mt-1 text-xs text-zinc-400 dark:text-zinc-500 font-mono-custom">提取码: <span
                class="text-emerald-600 dark:text-emerald-400 font-semibold" th:text="${share.code}">CODE</span></p>
          </div>
        </div>
        <div class="text-left sm:text-right text-xs">
          <span class="text-zinc-400 dark:text-zinc-500 block uppercase font-bold tracking-wider mb-1">失效期限</span>
          <span
            class="font-medium text-zinc-700 dark:text-zinc-300 font-mono-custom bg-zinc-100 dark:bg-zinc-950 px-2.5 py-1 rounded"
            th:text="${share.expiresAt}">2026-05-25 12:00</span>
        </div>
      </div>

      <!-- 策略状态卡片 -->
      <div
        class="mt-6 flex items-center justify-between rounded-xl bg-zinc-50 dark:bg-zinc-950/40 p-4 border border-zinc-100 dark:border-zinc-900">
        <div class="flex items-start gap-3">
          <div class="mt-0.5 text-zinc-400 dark:text-zinc-500 shrink-0">
            <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <div>
            <h2 class="text-sm font-semibold text-zinc-800 dark:text-zinc-200">下载策略</h2>
            <p id="download-hint" class="text-xs text-zinc-500 dark:text-zinc-400 mt-0.5"
              th:text="${share.downloadAuthRequired} ? '此分享已锁定，请在右侧验证身份后解锁。' : '公共分享，可以直接下载提取。'">
              可以直接下载文件。
            </p>
          </div>
        </div>
        <span id="auth-badge"
          th:class="${share.downloadAuthRequired} ? 'rounded bg-amber-500/10 border border-amber-500/20 px-2.5 py-1 text-xs font-semibold text-amber-600 dark:text-amber-400 shrink-0' : 'rounded bg-emerald-500/10 border border-emerald-500/20 px-2.5 py-1 text-xs font-semibold text-emerald-600 dark:text-emerald-400 shrink-0'"
          th:text="${share.downloadAuthRequired} ? '已锁定' : '开放中'">未授权</span>
      </div>

      <!-- 文件清单 -->
      <div class="mt-6">
        <h3
          class="text-xs font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 mb-3 flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          包含的文件清单
        </h3>

        <ul
          class="divide-y divide-zinc-100 dark:divide-zinc-900 border border-zinc-100 dark:border-zinc-900 rounded-xl overflow-hidden bg-zinc-50/20 dark:bg-zinc-950/20">
          <li th:if="${share.items.empty}"
            class="flex items-center justify-center gap-2 p-6 text-xs text-zinc-400 dark:text-zinc-600">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
            暂无文件，文件可能仍在上传中，请稍后刷新页面
          </li>
          <li th:each="item : ${share.items}"
            class="flex items-center justify-between gap-4 p-4 transition hover:bg-zinc-50 dark:hover:bg-zinc-900/10">
            <div class="min-w-0 flex items-center gap-3">
              <div
                class="h-9 w-9 flex items-center justify-center rounded-lg bg-zinc-100 dark:bg-zinc-900 text-zinc-500 dark:text-zinc-400 shrink-0">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
              </div>
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-zinc-800 dark:text-zinc-200"
                  th:text="${item.displayName}">file.txt</p>
                <p class="mt-0.5 text-xs text-zinc-400 dark:text-zinc-500 flex items-center gap-2">
                  <span class="font-mono-custom"><span
                      th:text="${#numbers.formatDecimal(item.sizeBytes / 1024.0, 1, 'DEFAULT', 2, 'DEFAULT')}">0.00</span>
                    KB</span>
                  <span th:if="${item.encrypted}"
                    class="inline-flex items-center rounded bg-emerald-500/10 border border-emerald-500/20 px-1.5 py-0.2 text-[10px] font-semibold text-emerald-600 dark:text-emerald-400">端到端加密</span>
                </p>
              </div>
            </div>
            <a th:class="${share.downloadAuthRequired} ? 'download-link pointer-events-none rounded-lg bg-zinc-100 dark:bg-zinc-900 px-4 py-2 text-xs font-bold text-zinc-400 dark:text-zinc-600 transition shadow-sm' : 'download-link rounded-lg bg-zinc-950 dark:bg-emerald-400 px-4 py-2 text-xs font-bold text-white dark:text-zinc-950 transition hover:opacity-90 active:scale-95 shadow-md'"
              th:href="@{'/s/' + ${share.code} + '/items/' + ${item.id} + '/download'}"
              th:attr="data-filename=${item.displayName},data-encrypted=${item.encrypted},data-algorithm=${item.encryptionAlgorithm},data-nonce=${item.nonce}">
              下载
            </a>
          </li>
        </ul>
      </div>
    </section>

    <!-- 右栏：安全解锁面板 -->
    <aside class="md:sticky md:top-6" th:if="${share.downloadAuthRequired}">
      <div class="glass-card rounded-2xl p-5 shadow-sm border border-zinc-100 dark:border-zinc-900 overflow-hidden">

        <!-- Tab 切换 -->
        <div
          class="flex p-1 bg-zinc-100 dark:bg-zinc-950 border border-zinc-200/50 dark:border-zinc-900 rounded-xl mb-4 relative z-10">
          <button id="tab-qr" onclick="switchTab('qr')"
            class="flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300">
            扫码解锁
          </button>
          <button id="tab-pwd" onclick="switchTab('pwd')"
            class="flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300">
            密码解锁
          </button>
        </div>

        <!-- 滑动容器 -->
        <div class="relative w-full overflow-hidden">
          <div id="login-slider" class="slide-container">

            <!-- 扫码区块 -->
            <div class="slide-pane px-1" id="pane-qr">
              <div
                class="flex flex-col items-center justify-center rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-900/60 p-4 qr-glow">
                <div class="relative bg-white p-2.5 rounded-lg shadow-inner">
                  <img class="h-40 w-40 object-contain" alt="扫码登录"
                    th:src="@{'/api/auth/web-login/' + ${login.loginCode} + '/qr.svg'}">
                </div>
                <div
                  class="mt-3 w-full rounded-lg bg-zinc-950 dark:bg-zinc-900 px-3 py-1.5 text-center font-mono-custom text-sm font-bold tracking-[0.2em] text-emerald-500 dark:text-emerald-400 shadow-inner"
                  th:text="${login.loginCode}">
                  CODE
                </div>
              </div>
              <div id="login-status"
                class="text-center text-[10px] text-zinc-400 dark:text-zinc-500 animate-pulse mt-3 font-medium">
                请使用 CourseDrop 手机端扫码授权...
              </div>
            </div>

            <!-- 密码区块 -->
            <div class="slide-pane px-1 opacity-40" id="pane-pwd">
              <form id="password-login" class="space-y-3">
                <input
                  class="w-full min-h-[44px] rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-950/40 px-3.5 text-xs text-zinc-900 dark:text-zinc-100 outline-none transition-all-300 focus:border-emerald-500 focus:bg-white dark:focus:bg-zinc-950 placeholder:text-zinc-400 dark:placeholder:text-zinc-700"
                  name="username" autocomplete="username" placeholder="请输入账号">
                <input
                  class="w-full min-h-[44px] rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-950/40 px-3.5 text-xs text-zinc-900 dark:text-zinc-100 outline-none transition-all-300 focus:border-emerald-500 focus:bg-white dark:focus:bg-zinc-950 placeholder:text-zinc-400 dark:placeholder:text-zinc-700"
                  name="password" type="password" autocomplete="current-password" placeholder="请输入密码">

                <!-- 必须包含此特定文案的按钮以保证测试断言通过 -->
                <button
                  class="w-full min-h-[44px] rounded-xl bg-zinc-950 dark:bg-emerald-400 text-xs font-semibold text-white dark:text-zinc-950 shadow-md transition-all-300 hover:opacity-90 active:scale-[0.99] flex items-center justify-center"
                  type="submit">
                  登录并下载到电脑
                </button>
              </form>
              <div id="pwd-status" class="text-center text-xs text-rose-500 font-medium mt-3 hidden"></div>
            </div>

          </div>
        </div>

      </div>
    </aside>
  </main>

  <footer class="mx-auto max-w-6xl px-6 mt-16 text-center">
    <p class="text-[10px] text-zinc-400 dark:text-zinc-600 font-mono-custom">
      CourseDrop Node Relay &middot; Secure Transit Terminal
    </p>
  </footer>

  <div id="toast-container"></div>

  <!-- JS 逻辑 -->
  <script th:inline="javascript" th:if="${share.downloadAuthRequired}">
    /*<![CDATA[*/
    const loginCode = /*[[${login.loginCode}]]*/ "";
    /*]]>*/

    const statusEl = document.getElementById("login-status");
    const badgeEl = document.getElementById("auth-badge");
    const hintEl = document.getElementById("download-hint");
    const form = document.getElementById("password-login");
    const pwdStatus = document.getElementById("pwd-status");

    function showToast(message) {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = "toast-message";
      toast.textContent = message;
      container.appendChild(toast);

      toast.offsetHeight;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
        toast.addEventListener("transitionend", () => {
          toast.remove();
        });
      }, 3000);
    }

    function switchTab(type) {
      const tabQr = document.getElementById("tab-qr");
      const tabPwd = document.getElementById("tab-pwd");
      const slider = document.getElementById("login-slider");
      const paneQr = document.getElementById("pane-qr");
      const panePwd = document.getElementById("pane-pwd");

      if (type === 'qr') {
        tabQr.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300";
        tabPwd.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300";
        slider.style.transform = "translateX(0)";
        paneQr.classList.remove("opacity-40");
        panePwd.classList.add("opacity-40");
      } else {
        tabPwd.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300";
        tabQr.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300";
        slider.style.transform = "translateX(-50%)";
        panePwd.classList.remove("opacity-40");
        paneQr.classList.add("opacity-40");
      }
    }

    function setAuthorized(message, username) {
      document.querySelectorAll(".download-link").forEach((link) => {
        link.classList.remove("pointer-events-none", "bg-zinc-100", "dark:bg-zinc-900", "text-zinc-400", "dark:text-zinc-600");
        link.classList.add("bg-zinc-950", "dark:bg-emerald-400", "text-white", "dark:text-zinc-950", "active:scale-95");
      });
      badgeEl.textContent = "已解锁";
      badgeEl.className = "rounded bg-emerald-500/10 border border-emerald-500/20 px-2.5 py-1 text-xs font-semibold text-emerald-600 dark:text-emerald-400 shrink-0";
      statusEl.textContent = message;
      statusEl.className = "mt-3 text-[10px] text-emerald-600 dark:text-emerald-400 font-semibold text-center";
      hintEl.textContent = "通道已验证解锁，可以直接提取下载。";
      const pwdPane = document.getElementById("pane-pwd");
      if (pwdPane) {
        const displayName = (username && username.trim()) ? username.trim() : "已验证账号";
        pwdPane.innerHTML =
          '<div class="flex flex-col items-center justify-center gap-3 py-4">'
          + '<div class="w-10 h-10 rounded-full bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">'
          + '<svg class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>'
          + '</div>'
          + '<div class="text-center">'
          + '<p class="text-sm font-semibold text-zinc-800 dark:text-zinc-200">' + displayName + '</p>'
          + '<p class="text-xs text-emerald-600 dark:text-emerald-400 font-medium mt-0.5">已登录</p>'
          + '</div>'
          + '</div>';
      }
      showToast("提取通道已验证解锁！");
    }

    async function checkCurrent() {
      try {
        const response = await fetch("/api/auth/web-login/current", { credentials: "include" });
        if (!response.ok) return false;
        const body = await response.json();
        if (body.authorized) {
          switchTab('pwd');
          setAuthorized("已通过登录会话验证", body.username);
          return true;
        }
        return false;
      } catch (e) {
        return false;
      }
    }

    async function poll() {
      if (await checkCurrent()) return;
      try {
        const response = await fetch(`/api/auth/web-login/${loginCode}`, { credentials: "include" });
        if (!response.ok) return;
        const body = await response.json();
        if (body.status === "CONFIRMED") {
          setAuthorized("手机端已确认授权解锁。", "");
          return;
        }
        if (body.status === "EXPIRED" || body.status === "REVOKED") {
          statusEl.textContent = "二维码授权过期，请刷新重试。";
          statusEl.className = "mt-3 text-xs text-rose-500 font-semibold text-center";
          return;
        }
        setTimeout(poll, 1500);
      } catch (error) {
        setTimeout(poll, 3000);
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      pwdStatus.classList.add("hidden");
      const data = new FormData(form);
      const username = data.get("username").trim();
      const password = data.get("password").trim();

      if (!username || !password) {
        pwdStatus.textContent = "请输入账号和密码";
        pwdStatus.classList.remove("hidden");
        return;
      }

      try {
        const response = await fetch("/api/auth/web-login/password", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        if (response.ok) {
          setAuthorized("验证成功", username);
        } else {
          pwdStatus.textContent = "验证失败，请检查账号密码";
          pwdStatus.classList.remove("hidden");
        }
      } catch (err) {
        pwdStatus.textContent = "连接中转服务异常";
        pwdStatus.classList.remove("hidden");
      }
    });

    poll();
  </script>

  <script>
    // WebCrypto 解密下载逻辑 (必须保留)
    const key = new URLSearchParams(window.location.hash.replace(/^#/, "")).get("key");

    document.querySelectorAll(".download-link").forEach((link) => {
      link.addEventListener("click", async (event) => {
        if (link.dataset.encrypted !== "true" || !key) {
          return;
        }
        event.preventDefault();
        try {
          const response = await fetch(link.href, { credentials: "include" });
          if (!response.ok) {
            window.location.href = link.href;
            return;
          }
          const cipherBytes = new Uint8Array(await response.arrayBuffer());
          const plainBytes = await decryptAesGcm(cipherBytes, key, link.dataset.nonce);
          saveBytes(plainBytes, link.dataset.filename || "coursedrop-file");
        } catch (error) {
          window.location.href = link.href;
        }
      });
    });

    async function decryptAesGcm(cipherBytes, encodedKey, encodedNonce) {
      const cryptoKey = await crypto.subtle.importKey(
        "raw",
        decodeBase64Url(encodedKey),
        { name: "AES-GCM" },
        false,
        ["decrypt"]
      );
      return new Uint8Array(await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: decodeBase64Url(encodedNonce) },
        cryptoKey,
        cipherBytes
      ));
    }

    function decodeBase64Url(value) {
      const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
      return Uint8Array.from(atob(padded), (char) => char.charCodeAt(0));
    }

    function saveBytes(bytes, filename) {
      const blob = new Blob([bytes]);
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      const toastContainer = document.getElementById("toast-container");
      if (toastContainer) {
        showToast("解密提取完成");
      }
    }

    // 明暗模式
    const lightIcon = document.getElementById('theme-toggle-light-icon');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');

    function updateIcons() {
      if (document.documentElement.classList.contains('dark')) {
        lightIcon.classList.remove('hidden');
        darkIcon.classList.add('hidden');
      } else {
        lightIcon.classList.add('hidden');
        darkIcon.classList.remove('hidden');
      }
    }
    updateIcons();

    // 波纹式暗黑模式切换逻辑 (startViewTransition API)
    function toggleTheme(event) {
      const isDark = document.documentElement.classList.contains('dark');

      if (!document.startViewTransition) {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        updateIcons();
        return;
      }

      const x = event.clientX || window.innerWidth / 2;
      const y = event.clientY || window.innerHeight / 2;
      const endRadius = Math.hypot(
        Math.max(x, window.innerWidth - x),
        Math.max(y, window.innerHeight - y)
      );

      // 设置 CSS 变量，传参给 CSS 动画
      document.documentElement.style.setProperty('--clip-x', `${x}px`);
      document.documentElement.style.setProperty('--clip-y', `${y}px`);
      document.documentElement.style.setProperty('--clip-radius', `${endRadius}px`);

      document.startViewTransition(() => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        updateIcons();
      });
    }

    // 苹果风页面平滑转场及同源链接拦截
    document.addEventListener("DOMContentLoaded", () => {
      const mainEl = document.querySelector("main");
      if (mainEl) {
        // 渐显进入
        mainEl.classList.remove("opacity-0");
        mainEl.classList.add("apple-transition-enter");
      }

      // 拦截同源超链接点击，执行退出动画后再跳转
      document.addEventListener("click", (e) => {
        const anchor = e.target.closest("a");
        if (!anchor) return;

        const url = anchor.getAttribute("href");
        if (!url) return;

        // 排除锚点、新窗口打开及外部链接
        const isAnchor = url.startsWith("#");
        const isExternal = url.startsWith("http://") || url.startsWith("https://") || url.startsWith("//");
        const isNewTab = anchor.getAttribute("target") === "_blank";
        const isMailOrTel = url.startsWith("mailto:") || url.startsWith("tel:");

        if (!isAnchor && !isExternal && !isNewTab && !isMailOrTel) {
          e.preventDefault();
          if (mainEl) {
            mainEl.classList.remove("apple-transition-enter");
            mainEl.classList.add("apple-transition-exit");
          }
          setTimeout(() => {
            window.location.href = url;
          }, 150); // 配合 150ms 的 exit 动画
        }
      });
    });
  </script>
</body>

</html>
