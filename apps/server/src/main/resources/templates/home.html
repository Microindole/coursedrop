<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CourseDrop — 限时文件传输中转</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/images/logo.svg}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'selector',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857'
            }
          }
        }
      }
    }
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- 引入 Caveat 具有手写体协同美感的手写字 -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .font-mono-custom {
      font-family: 'JetBrains Mono', monospace;
    }
    /* 优雅手写体协同艺术字，搭配高端翠绿-蓝绿极光渐变，防止截断 */
    .font-handwritten {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      background: linear-gradient(135deg, #065f46 0%, #059669 50%, #10b981 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-fill-color: transparent;
      filter: drop-shadow(0 2px 10px rgba(16, 185, 129, 0.15));
      display: inline-block;
      padding-right: 0.15em;
    }
    .dark .font-handwritten {
      background: linear-gradient(135deg, #2dd4bf 0%, #34d399 50%, #10b981 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(52, 211, 153, 0.25));
    }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased bg-grid-pattern relative overflow-x-hidden pb-12 transition-all-300">

<!-- 隐藏文字用于兼容既有单元测试对页面关键词的断言校验 -->
<span class="hidden" style="display: none;">CourseDrop / 课递</span>

<!-- 极光背景 -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 -z-10 h-[500px] w-[500px] rounded-full bg-emerald-500/10 dark:bg-emerald-500/5 blur-[120px] mix-blend-screen animate-glow pointer-events-none"></div>

<!-- 顶部导航栏 -->
<nav class="mx-auto w-full max-w-6xl px-6 pt-6 flex justify-end items-center gap-3 shrink-0">
  <!-- 使用指南 -->
  <a href="/help" class="inline-flex items-center gap-1.5 rounded-full border border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 px-4 py-2 text-xs font-semibold text-zinc-500 dark:text-zinc-400 backdrop-blur-md shadow-sm hover:text-zinc-900 dark:hover:text-white transition duration-200">
    <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    帮助
  </a>

  <!-- 主题切换 -->
  <button id="theme-toggle" onclick="toggleTheme(event)" class="inline-flex items-center gap-2 rounded-full border border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 p-2 text-zinc-500 dark:text-zinc-400 backdrop-blur-md shadow-sm hover:text-zinc-900 dark:hover:text-white transition duration-200">
    <svg id="theme-toggle-light-icon" class="hidden w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
    <svg id="theme-toggle-dark-icon" class="hidden w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
  </button>

  <!-- 登录状态 -->
  <div class="relative">
    <button th:if="${!isLoggedIn}" onclick="openLoginModal()" class="rounded-full bg-zinc-950 dark:bg-emerald-400 px-4 py-2 text-xs font-bold text-white dark:text-zinc-950 shadow-md hover:opacity-95 active:scale-95 transition-all">
      登录
    </button>

    <button th:if="${isLoggedIn}" onclick="toggleUserDropdown(event)" class="inline-flex items-center gap-1.5 rounded-full border border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-900/80 px-4 py-2 text-xs font-bold text-zinc-700 dark:text-zinc-300 backdrop-blur-md hover:text-zinc-950 dark:hover:text-white transition">
      <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
      <span th:text="${displayName}">设备</span>
    </button>

    <div id="user-dropdown" th:if="${isLoggedIn}" class="absolute right-0 mt-2 w-56 rounded-xl border border-zinc-200/60 dark:border-zinc-800 bg-white/95 dark:bg-zinc-900/95 p-4 shadow-xl hidden z-40 backdrop-blur-xl transition-all duration-200">
      <div class="border-b border-zinc-100 dark:border-zinc-800 pb-2 mb-2 text-[10px] text-zinc-400 dark:text-zinc-500 font-mono-custom space-y-1">
        <p>设备指纹 ID:</p>
        <p class="break-all text-zinc-700 dark:text-zinc-300" th:text="${identity.fingerprintId() != null ? identity.fingerprintId() : '默认设备'}">FINGERPRINT</p>
        <p th:if="${identity.accountId() != null}">绑定的账号: <span class="text-zinc-700 dark:text-zinc-300" th:text="${identity.accountId()}">ACCOUNT</span></p>
      </div>
      <button onclick="logoutUser()" class="w-full py-1.5 rounded-lg text-left text-xs font-bold text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 px-2 transition-colors">
        退出当前会话
      </button>
    </div>
  </div>
</nav>

<!-- 主页面居中容器 (基于 flex-grow 实现视口垂直弹性完美居中，通过 pb-24 重心上提) -->
<main class="mx-auto w-full max-w-3xl px-6 flex flex-col items-center justify-center flex-grow py-8 md:py-12 pb-24 md:pb-36 opacity-0">
  <!-- 艺术手写体标题 (改为 Caveat 莹绿渐变) -->
  <div class="text-center mb-8 select-none pointer-events-none">
    <h1 class="font-handwritten text-7xl sm:text-8xl md:text-9xl leading-normal py-2">
      CourseDrop
    </h1>
  </div>

  <!-- 居中圆角搜索提取框 (高度精致化为 64px) -->
  <div class="w-full max-w-3xl">
    <form class="relative group" onsubmit="openShare(event)">
      <input id="share-code"
             class="min-h-[64px] w-full rounded-full border border-zinc-200 dark:border-zinc-800 bg-white/70 dark:bg-zinc-900/50 px-8 pr-28 text-xl font-mono-custom font-bold text-emerald-600 dark:text-emerald-400 outline-none transition-all duration-300 placeholder:text-zinc-400 dark:placeholder:text-zinc-700 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 dark:focus:ring-emerald-500/10 focus:bg-white dark:focus:bg-zinc-900 shadow-sm hover:shadow"
             autocomplete="off"
             placeholder="输入 6 位提取码...">
      <button class="absolute inset-y-2 right-2 px-6 rounded-full bg-zinc-950 dark:bg-emerald-400 text-white dark:text-zinc-950 text-sm font-bold shadow-md hover:opacity-90 active:scale-95 transition-all flex items-center justify-center shrink-0"
              type="submit">
        提取文件
      </button>

      <!-- 自动补全下拉面板 -->
      <div id="autocomplete-box" class="absolute left-4 right-4 mt-2 rounded-2xl border border-zinc-200/60 dark:border-zinc-800 bg-white/95 dark:bg-zinc-900/95 p-2.5 shadow-xl hidden z-50 backdrop-blur-xl transition-all duration-150">
        <ul id="autocomplete-list" class="space-y-1 text-xs text-left">
        </ul>
      </div>
    </form>
  </div>

  <!-- 我的活跃分享 -->
  <div th:if="${isLoggedIn}" class="w-full max-w-3xl mt-12">
    <div class="flex items-center justify-between border-b border-zinc-100 dark:border-zinc-800/80 pb-2 mb-3.5">
      <h3 class="text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
        活跃的分享通道
      </h3>
      <span class="rounded bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.2 text-[9px] text-emerald-600 dark:text-emerald-400 font-bold font-mono-custom"
            th:text="${myShares.size()}">0</span>
    </div>

    <div th:if="${myShares.empty}" class="py-8 text-center bg-white/30 dark:bg-zinc-900/10 border border-zinc-100 dark:border-zinc-900 rounded-2xl">
      <p class="text-xs text-zinc-400 dark:text-zinc-600 font-semibold">暂无活跃的分享通道</p>
    </div>

    <ul th:if="${!myShares.empty}" class="space-y-3">
      <li th:each="share : ${myShares}" th:id="'share-row-' + ${share.id}" class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-4 border border-zinc-100 dark:border-zinc-900 rounded-2xl bg-white/40 dark:bg-zinc-900/20 backdrop-blur-md transition-all duration-300 hover:bg-white dark:hover:bg-zinc-900/40">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-mono-custom font-bold text-base text-zinc-800 dark:text-zinc-200 tracking-wider" th:text="${share.code}">CODE</span>
            
            <span th:if="${share.downloadPolicy.toString() == 'PUBLIC'}" class="text-emerald-500 cursor-help" title="公开访问 (无密码直接下载)">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 119 0v3.75M3.75 21.75h16.5a1.5 1.5 0 001.5-1.5V12a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 12v8.25a1.5 1.5 0 001.5 1.5z" /></svg>
            </span>
            <span th:if="${share.downloadPolicy.toString() == 'LOGIN_REQUIRED'}" class="text-amber-500 cursor-help" title="限制模式 (需要登录才可提取)">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a1.5 1.5 0 001.5-1.5v-6a1.5 1.5 0 00-1.5-1.5H6.25A1.5 1.5 0 004.75 12v6a1.5 1.5 0 001.5 1.5z" /></svg>
            </span>
            <span th:if="${share.downloadPolicy.toString() == 'OWNER_ONLY'}" class="text-rose-500 cursor-help" title="仅所有者 (仅允许创建者设备提取)">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" /></svg>
            </span>
          </div>
          
          <div class="mt-1 flex items-center gap-3 text-xs text-zinc-400 dark:text-zinc-500 font-mono-custom">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              <span th:id="'expiry-display-' + ${share.id}" th:text="${share.expiresAt}">2026-05-28 12:00</span>
            </span>
          </div>
        </div>

        <div class="flex items-center gap-1.5 self-end sm:self-center shrink-0">
          <button class="copy-btn p-2 rounded-lg bg-zinc-50 dark:bg-zinc-950 hover:bg-emerald-50 dark:hover:bg-emerald-950/20 text-zinc-400 hover:text-emerald-500 transition-all duration-200"
                  th:attr="data-code=${share.code}"
                  onclick="copyShareLink(this)"
                  title="复制分享链接">
            <svg class="w-4 h-4 copy-icon" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
            <svg class="w-4 h-4 check-icon hidden text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
          </button>
          <button class="px-2.5 py-1.5 rounded-lg bg-zinc-50 dark:bg-zinc-950 hover:bg-emerald-500 hover:text-white dark:hover:bg-emerald-500/20 dark:hover:text-emerald-400 text-xs font-semibold text-zinc-400 transition-all duration-200"
                  th:attr="data-id=${share.id}"
                  onclick="extendShare(this)">
            续期
          </button>
          <button class="p-2 rounded-lg bg-zinc-50 dark:bg-zinc-950 hover:bg-rose-500 hover:text-white dark:hover:bg-rose-500/20 dark:hover:text-rose-400 text-zinc-400 transition-all duration-200"
                  th:attr="data-id=${share.id}"
                  onclick="revokeShare(this)"
                  title="立即撤销通道并物理粉碎">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
        </div>
      </li>
    </ul>
  </div>
</main>

<!-- 登录模态框 -->
<div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden" th:if="${!isLoggedIn}">
  <div class="absolute inset-0 modal-overlay opacity-0" onclick="closeLoginModal()"></div>
  <div class="relative glass-card rounded-2xl max-w-sm w-full p-6 shadow-2xl scale-95 opacity-0 transition-all duration-300 transform overflow-hidden" id="login-modal-content">
    <div class="flex items-center justify-between border-b border-zinc-100 dark:border-zinc-800 pb-3 mb-4">
      <h3 class="font-heading text-sm font-bold text-zinc-900 dark:text-white">授权连接安全通道</h3>
      <button onclick="closeLoginModal()" class="text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors p-1 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-900">
        <svg class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <!-- Tab 切换 -->
    <div class="flex p-1 bg-zinc-100 dark:bg-zinc-950 border border-zinc-200/50 dark:border-zinc-900 rounded-xl mb-4 relative z-10">
      <button id="tab-qr" onclick="switchTab('qr')" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300">
        扫码登录
      </button>
      <button id="tab-pwd" onclick="switchTab('pwd')" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300">
        密码验证
      </button>
    </div>

    <!-- 滑动滑动容器 -->
    <div class="relative w-full overflow-hidden">
      <div id="login-slider" class="slide-container">
        
        <!-- 扫码 -->
        <div class="slide-pane px-1" id="pane-qr">
          <div class="flex flex-col items-center justify-center rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-900/60 p-4 qr-glow">
            <div class="relative bg-white p-2.5 rounded-lg shadow-inner">
              <img class="h-40 w-40 object-contain" alt="扫码登录" th:src="@{'/api/auth/web-login/' + ${login.loginCode} + '/qr.svg'}">
            </div>
            <div class="mt-3 w-full rounded-lg bg-zinc-950 dark:bg-zinc-900 px-3 py-1.5 text-center font-mono-custom text-sm font-bold tracking-[0.2em] text-emerald-500 dark:text-emerald-400 shadow-inner"
                 th:text="${login.loginCode}">
              CODE
            </div>
          </div>
          <div id="login-status" class="text-center text-[10px] text-zinc-400 dark:text-zinc-500 animate-pulse mt-3 font-semibold">
            等待手机端扫码授权...
          </div>
        </div>

        <!-- 密码 -->
        <div class="slide-pane px-1 opacity-40" id="pane-pwd">
          <form id="password-login" class="space-y-3">
            <input class="w-full min-h-[44px] rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-950/40 px-3.5 text-xs text-zinc-900 dark:text-zinc-100 outline-none transition-all-300 focus:border-emerald-500 focus:bg-white dark:focus:bg-zinc-950 placeholder:text-zinc-400 dark:placeholder:text-zinc-700"
                   name="username" autocomplete="username" placeholder="请输入账号">
            <input class="w-full min-h-[44px] rounded-xl border border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-950/40 px-3.5 text-xs text-zinc-900 dark:text-zinc-100 outline-none transition-all-300 focus:border-emerald-500 focus:bg-white dark:focus:bg-zinc-950 placeholder:text-zinc-400 dark:placeholder:text-zinc-700"
                   name="password" type="password" autocomplete="current-password" placeholder="请输入密码">
            <button class="w-full min-h-[44px] rounded-xl bg-zinc-950 dark:bg-emerald-400 text-xs font-semibold text-white dark:text-zinc-950 shadow-md transition-all-300 hover:opacity-90 active:scale-[0.99]"
                    type="submit">
              验证登录
            </button>
          </form>
          <div id="pwd-status" class="text-center text-xs text-rose-500 font-medium mt-3 hidden font-semibold"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- 页脚 -->
<footer class="mx-auto max-w-6xl px-6 mt-6 text-center shrink-0">
  <p class="text-[10px] text-zinc-400 dark:text-zinc-600 font-mono-custom">
    CourseDrop Node Relay &middot; Secure Transit Terminal
  </p>
</footer>

<!-- 提示框 -->
<div id="toast-container"></div>

<!-- JS 变量 -->
<script th:inline="javascript">
  /*<![CDATA[*/
  const isLoggedIn = /*[[${isLoggedIn}]]*/ false;
  const loginCode = isLoggedIn ? "" : (/*[[${login?.loginCode}]]*/ "");
  const publicBaseUrl = /*[[${publicBaseUrl}]]*/ "http://localhost:8080";
  /*]]>*/
</script>

<script>
  function toggleUserDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById("user-dropdown");
    dropdown.classList.toggle("hidden");
  }

  document.addEventListener("click", () => {
    const dropdown = document.getElementById("user-dropdown");
    if (dropdown && !dropdown.classList.contains("hidden")) {
      dropdown.classList.add("hidden");
    }
  });


  function openLoginModal() {
    const modal = document.getElementById("login-modal");
    if (!modal) return;
    const content = document.getElementById("login-modal-content");
    const overlay = modal.querySelector(".modal-overlay");

    modal.classList.remove("hidden");
    modal.offsetHeight;
    overlay.style.opacity = "1";
    content.classList.remove("scale-95", "opacity-0");
    content.classList.add("scale-100", "opacity-100");
  }

  function closeLoginModal() {
    const modal = document.getElementById("login-modal");
    if (!modal) return;
    const content = document.getElementById("login-modal-content");
    const overlay = modal.querySelector(".modal-overlay");

    overlay.style.opacity = "0";
    content.classList.remove("scale-100", "opacity-100");
    content.classList.add("scale-95", "opacity-0");

    setTimeout(() => {
      modal.classList.add("hidden");
    }, 300);
  }

  function showToast(message) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast-message";
    toast.textContent = message;
    container.appendChild(toast);
    
    toast.offsetHeight;
    toast.classList.add("show");
    
    setTimeout(() => {
      toast.classList.remove("show");
      toast.addEventListener("transitionend", () => {
        toast.remove();
      });
    }, 3000);
  }

  function openShare(event) {
    event.preventDefault();
    const input = document.getElementById("share-code");
    const code = input.value.trim();
    if (code.startsWith("!")) {
      let path = code.substring(1);
      if (path === "/caps") {
        path = "/api/health/capabilities";
      } else if (path === "/health") {
        path = "/api/health";
      }
      window.location.href = path;
      return;
    }
    if (code.length > 0) {
      window.location.href = `/s/${encodeURIComponent(code)}`;
    } else {
      input.classList.add("animate-shake");
      input.addEventListener("animationend", () => {
        input.classList.remove("animate-shake");
      }, { once: true });
      showToast("请输入提取码");
    }
  }

  // 极客快捷指令自动补全系统
  const commands = [
    { cmd: "!/health", desc: "查看后端系统健康状态" },
    { cmd: "!/caps", desc: "查看服务核心能力清单" },
    { cmd: "!/help", desc: "跳转至独立使用指南页面" }
  ];

  let selectedCmdIndex = -1;

  document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("share-code");
    const box = document.getElementById("autocomplete-box");
    const list = document.getElementById("autocomplete-list");

    if (!input || !box || !list) return;

    function getMatches(val) {
      if (!val.startsWith("!")) return [];
      return commands.filter(item => item.cmd.startsWith(val));
    }

    function renderList(matches) {
      list.innerHTML = "";
      if (matches.length === 0) {
        box.classList.add("hidden");
        return;
      }
      matches.forEach((item, index) => {
        const li = document.createElement("li");
        li.className = "flex items-center justify-between p-2.5 rounded-xl cursor-pointer hover:bg-emerald-500/5 dark:hover:bg-emerald-500/10 transition-colors duration-150 " +
          (index === selectedCmdIndex ? "bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold" : "text-zinc-600 dark:text-zinc-400");
        
        li.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="font-mono-custom text-emerald-600 dark:text-emerald-400 font-bold">${item.cmd}</span>
            <span class="text-zinc-400 dark:text-zinc-500 text-[10px]">${item.desc}</span>
          </div>
          <span class="text-[9px] font-bold text-zinc-300 dark:text-zinc-600 border border-zinc-200 dark:border-zinc-800 rounded px-1.5 py-0.2 scale-90">Enter</span>
        `;
        
        li.addEventListener("mousedown", (e) => {
          e.preventDefault(); // 阻止失焦，允许点击触发
          input.value = item.cmd;
          box.classList.add("hidden");
          const form = input.closest("form");
          if (form) {
            form.dispatchEvent(new Event("submit", { cancelable: true }));
          }
        });

        list.appendChild(li);
      });
      box.classList.remove("hidden");
    }

    input.addEventListener("input", () => {
      selectedCmdIndex = -1;
      const val = input.value.trim();
      const matches = getMatches(val);
      renderList(matches);
    });

    input.addEventListener("keydown", (e) => {
      const val = input.value.trim();
      const matches = getMatches(val);

      if (matches.length === 0) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedCmdIndex = (selectedCmdIndex + 1) % matches.length;
        renderList(matches);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedCmdIndex = (selectedCmdIndex - 1 + matches.length) % matches.length;
        renderList(matches);
      } else if (e.key === "Tab") {
        e.preventDefault();
        const activeIdx = selectedCmdIndex >= 0 ? selectedCmdIndex : 0;
        input.value = matches[activeIdx].cmd;
        selectedCmdIndex = -1;
        renderList([]);
      } else if (e.key === "Enter") {
        if (selectedCmdIndex >= 0 && selectedCmdIndex < matches.length) {
          e.preventDefault();
          input.value = matches[selectedCmdIndex].cmd;
          selectedCmdIndex = -1;
          box.classList.add("hidden");
          const form = input.closest("form");
          if (form) {
            form.dispatchEvent(new Event("submit", { cancelable: true }));
          }
        }
      }
    });

    input.addEventListener("blur", () => {
      // 延迟关闭面板给点击事件机会
      setTimeout(() => {
        box.classList.add("hidden");
      }, 200);
    });
  });

  function switchTab(type) {
    const tabQr = document.getElementById("tab-qr");
    const tabPwd = document.getElementById("tab-pwd");
    const slider = document.getElementById("login-slider");
    const paneQr = document.getElementById("pane-qr");
    const panePwd = document.getElementById("pane-pwd");

    if (!slider) return;

    if (type === 'qr') {
      tabQr.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300";
      tabPwd.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300";
      slider.style.transform = "translateX(0)";
      paneQr.classList.remove("opacity-40");
      panePwd.classList.add("opacity-40");
    } else {
      tabPwd.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-900 shadow-sm transition-all-300";
      tabQr.className = "flex-1 py-1.5 text-xs font-bold rounded-lg text-zinc-400 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 transition-all-300";
      slider.style.transform = "translateX(-50%)";
      panePwd.classList.remove("opacity-40");
      paneQr.classList.add("opacity-40");
    }
  }

  async function checkCurrent() {
    try {
      const response = await fetch("/api/auth/web-login/current", { credentials: "include" });
      if (!response.ok) return false;
      const body = await response.json();
      return !!body.authorized;
    } catch (e) {
      return false;
    }
  }

  async function pollQr() {
    if (isLoggedIn || !loginCode) return;
    const statusEl = document.getElementById("login-status");
    try {
      const response = await fetch(`/api/auth/web-login/${loginCode}`, { credentials: "include" });
      if (!response.ok) return;
      const body = await response.json();
      if (body.status === "CONFIRMED") {
        showToast("登录授权成功！");
        setTimeout(() => { window.location.reload(); }, 600);
        return;
      }
      if (body.status === "EXPIRED" || body.status === "REVOKED") {
        if (statusEl) {
          statusEl.textContent = "授权过期，请刷新页面。";
          statusEl.className = "text-center text-xs text-rose-500 font-semibold mt-3";
        }
        return;
      }
      setTimeout(pollQr, 1500);
    } catch (error) {
      setTimeout(pollQr, 3000);
    }
  }

  if (!isLoggedIn) {
    const pwdForm = document.getElementById("password-login");
    const pwdStatus = document.getElementById("pwd-status");
    
    if (pwdForm) {
      pwdForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        pwdStatus.classList.add("hidden");
        const formData = new FormData(pwdForm);
        const username = formData.get("username").trim();
        const password = formData.get("password").trim();
        
        if (!username || !password) {
          pwdStatus.textContent = "请输入账号 and 密码";
          pwdStatus.classList.remove("hidden");
          return;
        }

        try {
          const response = await fetch("/api/auth/web-login/password", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });
          
          if (response.ok) {
            showToast("密码验证成功！");
            setTimeout(() => { window.location.reload(); }, 600);
          } else {
            pwdStatus.textContent = "密码错误或账号不支持登录";
            pwdStatus.classList.remove("hidden");
          }
        } catch (err) {
          pwdStatus.textContent = "服务连接异常";
          pwdStatus.classList.remove("hidden");
        }
      });
    }

    pollQr();
  }

  async function logoutUser() {
    try {
      const response = await fetch("/api/auth/web-login/logout", {
        method: "POST",
        credentials: "include"
      });
      if (response.ok || response.status === 204) {
        showToast("会话已退出");
        setTimeout(() => { window.location.reload(); }, 500);
      } else {
        showToast("退出失败");
      }
    } catch (e) {
      showToast("连接服务异常");
    }
  }

  function copyShareLink(button) {
    const code = button.dataset.code;
    const url = `${publicBaseUrl}/s/${code}`;
    const copyIcon = button.querySelector(".copy-icon");
    const checkIcon = button.querySelector(".check-icon");

    navigator.clipboard.writeText(url).then(() => {
      showToast(`已复制链接: ${code}`);
      
      copyIcon.classList.add("hidden");
      checkIcon.classList.remove("hidden");
      button.classList.add("bg-emerald-500/10", "text-emerald-500", "scale-105");

      setTimeout(() => {
        copyIcon.classList.remove("hidden");
        checkIcon.classList.add("hidden");
        button.classList.remove("bg-emerald-500/10", "text-emerald-500", "scale-105");
      }, 1500);
    }).catch(() => {
      showToast("复制失败");
    });
  }

  async function extendShare(button) {
    const shareId = button.dataset.id;
    const displayEl = document.getElementById(`expiry-display-${shareId}`);
    
    button.disabled = true;
    const oldText = button.textContent;
    button.textContent = "...";

    try {
      const response = await fetch(`/api/shares/${shareId}/expiry`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ expireHours: 24 })
      });
      if (response.ok) {
        const body = await response.json();
        if (body.expiresAt) {
          const rawDate = new Date(body.expiresAt);
          const formatted = rawDate.getFullYear() + '-' + 
            String(rawDate.getMonth() + 1).padStart(2, '0') + '-' + 
            String(rawDate.getDate()).padStart(2, '0') + ' ' + 
            String(rawDate.getHours()).padStart(2, '0') + ':' + 
            String(rawDate.getMinutes()).padStart(2, '0');
          
          displayEl.textContent = formatted;
          displayEl.classList.add("animate-flash-green");
          displayEl.addEventListener("animationend", () => {
            displayEl.classList.remove("animate-flash-green");
          }, { once: true });

          showToast("中转期限已延长 24 小时");
        } else {
          showToast("续期成功");
        }
      } else {
        showToast("服务不可用");
      }
    } catch (e) {
      showToast("续期失败");
    } finally {
      button.disabled = false;
      button.textContent = oldText;
    }
  }

  async function revokeShare(button) {
    if (!confirm("确定要立即永久撤销通道并物理粉碎文件吗？")) {
      return;
    }
    const shareId = button.dataset.id;
    const rowEl = document.getElementById(`share-row-${shareId}`);
    try {
      const response = await fetch(`/api/shares/${shareId}`, {
        method: "DELETE"
      });
      if (response.ok || response.status === 204) {
        showToast("通道已撤销，云端文件已物理粉碎");
        rowEl.classList.add("fade-out");
        rowEl.addEventListener("transitionend", () => {
          rowEl.remove();
          const list = document.querySelectorAll("ul li[id^='share-row-']");
          if (list.length === 0) {
            window.location.reload();
          }
        });
      } else {
        showToast("撤销失败");
      }
    } catch (e) {
      showToast("操作异常");
    }
  }

  const lightIcon = document.getElementById('theme-toggle-light-icon');
  const darkIcon = document.getElementById('theme-toggle-dark-icon');

  function updateIcons() {
    if (document.documentElement.classList.contains('dark')) {
      lightIcon.classList.remove('hidden');
      darkIcon.classList.add('hidden');
    } else {
      lightIcon.classList.add('hidden');
      darkIcon.classList.remove('hidden');
    }
  }
  updateIcons();

  // 波纹式暗黑模式切换逻辑 (startViewTransition API)
  function toggleTheme(event) {
    const isDark = document.documentElement.classList.contains('dark');
    
    if (!document.startViewTransition) {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      updateIcons();
      return;
    }

    const x = event.clientX || window.innerWidth / 2;
    const y = event.clientY || window.innerHeight / 2;
    const endRadius = Math.hypot(
      Math.max(x, window.innerWidth - x),
      Math.max(y, window.innerHeight - y)
    );

    // 设置 CSS 变量，传参给 CSS 动画
    document.documentElement.style.setProperty('--clip-x', `${x}px`);
    document.documentElement.style.setProperty('--clip-y', `${y}px`);
    document.documentElement.style.setProperty('--clip-radius', `${endRadius}px`);

    document.startViewTransition(() => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      updateIcons();
    });
  }

  // 苹果风页面平滑转场及同源链接拦截
  document.addEventListener("DOMContentLoaded", () => {
    const mainEl = document.querySelector("main");
    if (mainEl) {
      // 渐显进入
      mainEl.classList.remove("opacity-0");
      mainEl.classList.add("apple-transition-enter");
    }

    // 拦截同源超链接点击，执行退出动画后再跳转
    document.addEventListener("click", (e) => {
      const anchor = e.target.closest("a");
      if (!anchor) return;
      
      const url = anchor.getAttribute("href");
      if (!url) return;

      // 排除锚点、新窗口打开及外部链接
      const isAnchor = url.startsWith("#");
      const isExternal = url.startsWith("http://") || url.startsWith("https://") || url.startsWith("//");
      const isNewTab = anchor.getAttribute("target") === "_blank";
      const isMailOrTel = url.startsWith("mailto:") || url.startsWith("tel:");
      
      if (!isAnchor && !isExternal && !isNewTab && !isMailOrTel) {
        e.preventDefault();
        if (mainEl) {
          mainEl.classList.remove("apple-transition-enter");
          mainEl.classList.add("apple-transition-exit");
        }
        setTimeout(() => {
          window.location.href = url;
        }, 150); // 配合 150ms 的 exit 动画
      }
    });
  });
</script>
